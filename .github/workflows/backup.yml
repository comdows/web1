# 주간 데이터 백업 — Supabase 사용자 생성 데이터를 암호화 아티팩트로 보존(90일 롤링).
# service key 불사용: admin 봇 JWT(RLS)로만 읽는다. 실패 시 GitHub 기본 실패 메일이 알림 역할.
# 필요 Secrets: SUPABASE_URL, SUPABASE_ANON_KEY, ADMIN_BOT_EMAIL, ADMIN_BOT_PASSWORD, BACKUP_PASSPHRASE
# 복원 절차: README.md '운영 루틴 > 백업·복원' 참고.
name: Weekly data backup
on:
  schedule:
    - cron: "0 19 * * 0"   # 매주 월요일 04:00 KST
  workflow_dispatch:
jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - name: Export tables via admin bot (RLS)
        working-directory: backend/collect
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          ADMIN_BOT_EMAIL: ${{ secrets.ADMIN_BOT_EMAIL }}
          ADMIN_BOT_PASSWORD: ${{ secrets.ADMIN_BOT_PASSWORD }}
        run: node backup.mjs
      - name: Encrypt snapshot (gpg symmetric)
        working-directory: backend/collect
        env:
          BACKUP_PASSPHRASE: ${{ secrets.BACKUP_PASSPHRASE }}
        run: |
          test -n "$BACKUP_PASSPHRASE" || { echo "BACKUP_PASSPHRASE secret 미설정"; exit 1; }
          f=$(ls backup-*.json)
          gpg --symmetric --cipher-algo AES256 --batch --passphrase "$BACKUP_PASSPHRASE" "$f"
          rm "$f"   # 평문은 아티팩트에 올리지 않는다
      - uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_id }}
          path: backend/collect/backup-*.json.gpg
          retention-days: 90
          if-no-files-found: error
