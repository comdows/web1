# CI — PR·작업 브랜치 push마다 린트+타입체크+빌드(프리렌더·EN 금지 링크 검사 포함) 검증.
# 배포는 pages.yml(master 전용)이 따로 담당 — 이 워크플로는 게이트만.
name: ci

on:
  pull_request:
  push:
    branches-ignore: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      # 마이그레이션 정합 게이트 — ALL.sql은 cat 00*.sql 수동 재생성이라 깜빡하면 조용히 어긋남.
      # (1) ALL.sql == 00*.sql 연결 (2) 번호 중복 없음(동시 작업으로 같은 000N 두 개 생기는 사고 차단)
      - name: migrations integrity
        working-directory: backend/migrations
        run: |
          cat 00*.sql | diff -q - ALL.sql || { echo "::error::ALL.sql이 00*.sql 연결과 다릅니다 — 'cat 00*.sql > ALL.sql'로 재생성 후 커밋하세요"; exit 1; }
          dup=$(ls 00*.sql | cut -c1-4 | sort | uniq -d); [ -z "$dup" ] || { echo "::error::마이그레이션 번호 중복: $dup"; exit 1; }
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - run: npm run lint
      # 골든 테스트(vitest) — 익명성 CONTACT_RE·세션 shape·가치진단 회귀 자동 차단(적대 입력 방어)
      - run: npm test
      # 수집 풀 불변식 — 국내/해외×main/ad 독립 예산·빈 버킷 비이월·ad 자동등재 차단
      - name: collector pool tests
        working-directory: .
        run: node --test backend/collect/pool-selection.test.mjs
      # build = tsc -b + 시드 검증 + vite + 프리렌더 ko/en(EN 금지 링크 grep이 실패 시 빌드 중단)
      - run: npm run build
