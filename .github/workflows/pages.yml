name: Deploy to GitHub Pages

# 세모플 React 앱(app/)을 빌드해 GitHub Pages로 배포한다.
# (이전 정적 사이트 mvp/ 는 저장소에 백업으로 보존 — 되돌리려면 이 워크플로우를 mvp 업로드로 되돌리면 된다.)

on:
  push:
    branches:
      - master
    paths:
      - "app/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch: {}   # 수동 실행 허용

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install deps
        working-directory: app
        run: npm ci

      - name: Build (Vite, base=/semopl/)
        working-directory: app
        # Supabase 연결값은 app/.env.production 에 커밋되어 있다(anon 키는 설계상 공개 키 —
        # 어차피 브라우저 번들에 실려 나가며, 실제 보호는 RLS가 담당). Vite가 빌드 시 자동 로드.
        # 키를 git에 두기 싫으면 이 파일을 지우고 아래 env로 Secrets 주입하면 된다(둘 중 하나만):
        #   env:
        #     VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
        #     VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        # service_role 키는 절대 커밋·주입하지 않는다.
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact (app/dist)
        uses: actions/upload-pages-artifact@v3
        with:
          path: app/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
