name: Deploy to GitHub Pages

# 세모플 React 앱(app/)을 빌드해 GitHub Pages로 배포한다.
# (이전 정적 사이트 mvp/ 는 저장소에 백업으로 보존 — 되돌리려면 이 워크플로우를 mvp 업로드로 되돌리면 된다.)

on:
  push:
    branches:
      - master
    paths:
      - "app/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch: {}   # 수동 실행 허용

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install deps
        working-directory: app
        run: npm ci

      - name: Build (Vite, base=/web1/)
        working-directory: app
        # Supabase 키는 저장소 Secrets에서 주입(미설정 시 빈 값 → 앱은 로컬 JSON 모드로 동작).
        # VITE_ 접두사 변수만 클라이언트 번들에 포함된다. anon 키는 공개 키(RLS로 보호)이므로
        # 정적 배포물에 포함되어도 안전하다. service_role 키는 절대 여기 두지 않는다.
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact (app/dist)
        uses: actions/upload-pages-artifact@v3
        with:
          path: app/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
