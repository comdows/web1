<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>실수령 계산기 — 플랫폼올</title>
<link rel="stylesheet" href="assets/style.css">
</head>
<body>
<header class="site"><div class="container">
  <div class="logo">플랫폼<b>올</b></div>
  <nav class="top">
    <a href="index.html">발견·비교</a>
    <a href="compare.html">비교함 (<span id="cmp-count">0</span>)</a>
    <a href="calculator.html">실수령 계산기</a>
  </nav>
</div></header>

<main class="container">
  <section>
    <h2 class="sec" style="margin-top:28px">💰 크라우드펀딩 실수령 계산기</h2>
    <p class="sub">목표 모금액을 넣으면 플랫폼 수수료·PG·부가세를 반영한 <b>실수령액 범위</b>를 계산합니다. 로그인 불필요.</p>

    <div class="calc">
      <div>
        <div class="field">
          <label>플랫폼 선택</label>
          <select id="pf"></select>
        </div>
        <div class="field">
          <label>목표 모금액 (원)</label>
          <input id="amount" type="number" inputmode="numeric" value="10000000" min="0" step="100000">
        </div>
        <div class="field">
          <label>수수료 기준</label>
          <select id="mode">
            <option value="mid" selected>대표값(중간)</option>
            <option value="min">하한(최선)</option>
            <option value="max">상한(최악)</option>
          </select>
        </div>
        <div class="field" id="pg-field">
          <label>PG 결제수수료 (%) <span class="muted" id="pg-note">— 플랫폼 별도 부과 가정</span></label>
          <input id="pg" type="number" value="2.5" min="0" step="0.1">
        </div>
        <div class="field" id="vat-field">
          <label><input type="checkbox" id="vat" style="width:auto;vertical-align:middle"> 수수료에 부가세 10% 추가</label>
        </div>
      </div>

      <div class="result">
        <div class="muted">예상 실수령액 <span id="mode-label" class="muted"></span></div>
        <div class="big net" id="net">–</div>
        <div class="line"><span>목표 모금액</span><span id="r-amount">–</span></div>
        <div class="line"><span id="r-feelabel">플랫폼 수수료</span><span class="fee-neg" id="r-fee">–</span></div>
        <div class="line"><span id="r-pglabel">PG 수수료</span><span class="fee-neg" id="r-pg">–</span></div>
        <div class="line"><span id="r-vatlabel">부가세</span><span class="fee-neg" id="r-vat">–</span></div>
        <div class="line"><b>실수령 합계</b><b class="net" id="r-net">–</b></div>
        <div class="line"><span>실부담률</span><span id="r-rate">–</span></div>
        <div class="line"><span>수수료 범위 기준 실수령</span><span id="r-range">–</span></div>
        <p class="sub" id="note" style="margin-top:14px"></p>
      </div>
    </div>
  </section>
</main>

<footer class="site"><div class="container">
  플랫폼올 (가칭) · 1단계 MVP 데모 · 수수료 값은 예시이며 실제 계약 조건과 다를 수 있습니다.
</div></footer>

<script src="data/platforms.js"></script>
<script src="assets/app.js"></script>
<script>
document.addEventListener("DOMContentLoaded", () => {
  const cf = App.byVertical("crowdfunding");
  const pf = document.getElementById("pf");
  pf.innerHTML = cf.map(p => `<option value="${p.platform_id}">${p.name} (${App.feeText(p)})</option>`).join("");
  const el = id => document.getElementById(id);

  // 특정 요율(rate)로 실수령 계산
  function net(p, amount, rate) {
    const f = p.fee_model;
    const platformFee = amount * rate / 100;
    // PG가 수수료에 포함(pg_included)이면 이중계상 방지 — 사용자 입력 PG 무시
    const pgRate = f.pg_included ? 0 : Math.max(0, Number(el("pg").value) || 0);
    const pgFee = amount * pgRate / 100;
    // 부가세: 데이터가 vat_included면 이미 포함(추가 0), 아니면 사용자 토글
    const vat = (!f.vat_included && el("vat").checked) ? (platformFee + pgFee) * 0.10 : 0;
    const result = amount - platformFee - pgFee - vat;
    return { platformFee, pgFee, pgRate, vat, result };
  }

  function calc() {
    const p = App.byId(pf.value);
    const f = p.fee_model;
    const amount = Math.max(0, Number(el("amount").value) || 0);
    const mode = el("mode").value;
    const rate = mode === 'min' ? f.rate_min : mode === 'max' ? f.rate_max : (f.rate_min + f.rate_max) / 2;

    // PG 입력 활성/비활성 (pg_included면 잠금)
    el("pg").disabled = f.pg_included;
    el("pg-field").style.opacity = f.pg_included ? .5 : 1;
    el("pg-note").textContent = f.pg_included ? "— 이 플랫폼은 수수료에 PG가 포함되어 별도 부과하지 않습니다" : "— 플랫폼 별도 부과 가정";
    el("vat-field").style.opacity = f.vat_included ? .5 : 1;
    el("vat").disabled = f.vat_included;

    const cur = net(p, amount, rate);
    const lo = net(p, amount, f.rate_max).result; // 최악(상한)
    const hi = net(p, amount, f.rate_min).result; // 최선(하한)

    el("mode-label").textContent = mode==='mid'?'(대표값 기준)':mode==='min'?'(하한/최선 기준)':'(상한/최악 기준)';
    el("net").textContent = App.won(cur.result);
    el("r-amount").textContent = App.won(amount);
    el("r-feelabel").textContent = `플랫폼 수수료 (${(+rate).toFixed(1)}%, ${mode==='mid'?'대표':mode==='min'?'하한':'상한'})`;
    el("r-fee").textContent = "− " + App.won(cur.platformFee);
    el("r-pglabel").textContent = f.pg_included ? "PG 수수료 (수수료에 포함)" : `PG 수수료 (${cur.pgRate}%)`;
    el("r-pg").textContent = f.pg_included ? "포함" : "− " + App.won(cur.pgFee);
    el("r-vatlabel").textContent = f.vat_included ? "부가세 (포함)" : "부가세";
    el("r-vat").textContent = f.vat_included ? "포함" : (el("vat").checked ? "− " + App.won(cur.vat) : "미적용");
    el("r-net").textContent = App.won(cur.result);
    el("r-rate").textContent = amount>0 ? ((1 - cur.result/amount)*100).toFixed(1) + "%" : "–";
    el("r-range").textContent = `${App.won(lo)} ~ ${App.won(hi)}`;

    const hid = (f.hidden_fees||[]);
    el("note").innerHTML = `수수료 <b>${f.rate_min}~${f.rate_max}%</b> 범위 기준입니다. `
      + (hid.length ? `⚠ ${p.name}은(는) <b>${hid.join(", ")}</b> 등이 있을 수 있습니다. ` : '')
      + `정확한 조건은 <a href="${p.evidence?p.evidence.source_url:p.outbound_url}" target="_blank" rel="nofollow noopener">공식 안내</a>에서 확인하세요.`;
    __track("calc", { id: p.platform_id, amount, mode });
  }

  ["change","input"].forEach(ev => {
    ["pf","amount","mode","pg","vat"].forEach(id => el(id).addEventListener(ev, calc));
  });
  calc();
});
</script>
</body>
</html>
