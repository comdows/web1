<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>플랫폼 비교 — 플랫폼올</title>
<link rel="stylesheet" href="assets/style.css">
</head>
<body>
<header class="site"><div class="container">
  <div class="logo">플랫폼<b>올</b></div>
  <nav class="top">
    <a href="index.html">발견·비교</a>
    <a href="compare.html">비교함 (<span id="cmp-count">0</span>)</a>
    <a href="calculator.html">실수령 계산기</a>
  </nav>
</div></header>

<main class="container">
  <section>
    <div class="detail-head" style="margin-top:28px;justify-content:space-between">
      <h2 class="sec" style="margin:0">플랫폼 나란히 비교</h2>
      <button class="btn ghost" id="share" style="display:none">🔗 이 비교 공유</button>
    </div>
    <p class="sub">같은 축으로 정렬해 <b>숨은 비용·정산 조건</b>을 한눈에 봅니다. (담은 항목: 최대 4개)</p>
    <div id="out"></div>
  </section>
</main>

<footer class="site"><div class="container">
  플랫폼올 (가칭) · 1단계 MVP 데모 · 데이터는 예시이며 평가성 서술은 검증 전까지 표시하지 않습니다.
</div></footer>

<script src="data/platforms.js"></script>
<script src="assets/app.js"></script>
<script>
document.addEventListener("DOMContentLoaded", () => {
  const out = document.getElementById("out");
  const items = [...App.getCompareSet()].map(id => App.byId(id)).filter(p => p && !p.stub);

  if (!items.length) {
    const cf = App.byVertical("crowdfunding");
    const preset = (a, b) => `<button class="btn ghost preset" data-ids="${a},${b}">${App.byId(a).name} vs ${App.byId(b).name}</button>`;
    out.innerHTML = `<div class="empty">비교함이 비어 있습니다.<br>
      <a href="index.html">발견·비교</a>에서 2~4개를 담거나, 아래 추천 조합으로 바로 시작하세요.
      <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:16px">
        ${preset('wadiz','tumblbug')} ${preset('wadiz','ohmycompany')} ${preset('kickstarter','wadiz')}
      </div></div>`;
    out.querySelectorAll(".preset").forEach(b => b.addEventListener("click", () => {
      location.search = "?ids=" + b.dataset.ids;
    }));
    return;
  }

  document.getElementById("cmp-count").textContent = items.length;
  // URL을 정렬된 공유 가능한 형태로 정규화
  history.replaceState(null, "", "?ids=" + items.map(p=>p.platform_id).sort().join(","));
  const share = document.getElementById("share");
  share.style.display = "";
  share.addEventListener("click", async () => {
    const url = location.href;
    try { await navigator.clipboard.writeText(url); share.textContent = "✅ 링크 복사됨"; }
    catch (e) { prompt("아래 링크를 복사하세요", url); }
    App.__track && App.__track("share_compare", { ids: items.map(p=>p.platform_id) });
  });

  // 수수료 배지: 요율 비공개/신뢰도에 따라 색상 단정 회피
  const feeBadge = (p) => {
    const f = p.fee_model, hidden = (f.hidden_fees||[]).length;
    if (f.disclosed === false || f.rate_min == null)
      return `<span class="badge muted-badge">요율 비공개</span>` + (hidden ? ` <span class="badge warn">추가비용 ${hidden}건</span>` : '');
    const cls = App.isTrusted(p) ? (f.rate_max>=13?'warn':'good') : 'muted-badge';
    const note = App.isTrusted(p) ? '' : ' <span class="badge muted-badge">미검증</span>';
    return `<span class="badge ${cls}">${App.feeText(p)}</span>` +
           (hidden ? `<span class="badge warn">추가비용 ${hidden}건</span>` : '') + note;
  };
  const settleBadge = (s) => {
    if (s.cycle_days == null)
      return `<span class="badge muted-badge">확인 불가</span>` + (s.escrow?`<span class="badge good">에스크로</span>`:'');
    const b = s.cycle_days<=14 ? 'good' : (s.cycle_days<=21?'warn':'bad');
    return `<span class="badge ${b}">${s.cycle_days}일</span>`
      + (s.holdback_pct?` <span class="badge warn">유보 ${s.holdback_pct}%</span>`:'')
      + (s.escrow?` <span class="badge good">에스크로</span>`:'');
  };
  // 사실성 주석(출처 有)은 표시, 평가성(cautions)은 high 검증 전엔 미표시 (§12)
  const factsCell = (p) => {
    const facts = (p.facts||[]).map(h=>`<span class="badge muted-badge">${h}</span>`).join(" ");
    const caut = App.isTrusted(p) ? (p.cautions||[]).map(h=>`<span class="badge bad">${h}</span>`).join(" ") : '';
    return (facts + " " + caut).trim() || '-';
  };
  const trustCell = (p) => {
    const st = App.staleness(p);
    const link = p.evidence.source_url ? ` · <a href="${p.evidence.source_url}" target="_blank" rel="nofollow noopener">원문</a>` : '';
    return `<span class="badge ${st.cls}">${st.label}</span> <span class="muted" style="font-size:12px">${p.evidence.source}${link}</span>`;
  };
  const outbound = (p) => p.outbound_url
    ? `<a class="btn ghost" style="padding:6px 10px;font-size:12px" href="${p.outbound_url}" target="_blank" rel="nofollow sponsored noopener" onclick="__track('outbound_click',{id:'${p.platform_id}',from:'compare'})">공식 사이트 ↗</a>` : '';

  const rows = [
    ["펀딩 유형",   p => p.funding_type || '-'],
    ["지역",        p => (p.region||[]).join(", ")],
    ["수수료",      p => feeBadge(p)],
    ["숨은 비용",   p => (p.fee_model.hidden_fees||[]).map(h=>`<span class="badge warn">${h}</span>`).join(" ") || '-'],
    ["정산주기",    p => settleBadge(p.settlement)],
    ["정산/분쟁 정책", p => p.settlement.dispute_policy || '-'],
    ["가입 대상",   p => p.onboarding.biz_type_required],
    ["심사기간",    p => p.onboarding.review_days == null ? '<span class="muted">확인 불가</span>' : `${p.onboarding.review_days}일`],
    ["트래픽(추정)", p => p.scale.traffic_tier],
    ["강점",        p => (p.highlights||[]).map(h=>`<span class="badge good">${h}</span>`).join(" ")],
    ["사실·주의",   p => factsCell(p)],
    ["데이터 신뢰", p => trustCell(p)],
    ["바로가기",    p => outbound(p)]
  ];

  out.innerHTML = `<div class="cmp-wrap"><table class="cmp">
    <thead><tr><th>항목</th>${items.map(p=>`<th><a href="platform.html?id=${p.platform_id}">${p.name}</a></th>`).join("")}</tr></thead>
    <tbody>${rows.map(([label,fn]) =>
      `<tr><th>${label}</th>${items.map(p=>`<td>${fn(p)}</td>`).join("")}</tr>`).join("")}
    </tbody></table></div>
    <p class="sub" style="margin-top:14px">🎯 초록 = 유리 / 노랑 = 확인 필요 / 회색 = 미검증·비공개. <b>수수료·정산은 각 플랫폼 공식 출처(원문 링크) 기반</b>이나
    자동조회 차단으로 스니펫 교차확인(신뢰도 mid/low)입니다. 평가성 서술은 원문 직접검증(high) 전까지 표시하지 않습니다. 계약 전 반드시 원문 약관을 확인하세요.</p>`;
  __track("compare_view", { ids: items.map(p=>p.platform_id) });
});
</script>
</body>
</html>
