<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>플랫폼올 — 분야별 플랫폼 한눈에 보기</title>
<meta name="description" content="판매채널·크라우드펀딩·프리랜서·배달·수출입 등 사업자·개인이 활용할 수 있는 플랫폼을 분야별로 정리한 디렉토리.">
<link rel="stylesheet" href="assets/style.css">
</head>
<body>
<header class="site"><div class="container">
  <div class="logo">플랫폼<b>올</b></div>
  <nav class="top">
    <a href="index.html">분야별 플랫폼</a>
    <a href="#cats">분야 바로가기</a>
  </nav>
</div></header>

<main class="container">
  <section class="hero">
    <h1>어떤 분야에 어떤 플랫폼이 있을까?</h1>
    <p>사업자·개인이 <b>나가서 붙을 수 있는 플랫폼</b>을 분야별로 정리했습니다.
       판매채널·크라우드펀딩·프리랜서·배달·수출입·도매·숙박·중고까지, 이름과 개략 설명만 빠르게 훑어보세요.</p>
    <div class="toolbar">
      <input class="search" id="q" type="search" placeholder="플랫폼·분야 검색 (예: 쿠팡, 펀딩, 수출)">
    </div>
  </section>

  <section id="cats">
    <div class="filters" id="catfilter"></div>
  </section>

  <div id="dir"></div>

  <div class="banner" style="margin-top:24px">
    ⓘ 각 플랫폼 설명은 <b>개략 소개</b>입니다. 수수료·정산·입점 조건 등 상세 정보는 각 플랫폼 <b>공식 사이트</b>에서 확인하세요.
    빠진 플랫폼이나 분야가 있으면 알려주시면 추가합니다.
  </div>
</main>

<footer class="site"><div class="container">
  플랫폼올 (가칭) · 분야별 플랫폼 디렉토리 · 개략 설명이며 상세는 공식 사이트 확인.
</div></footer>

<script src="data/platforms.js"></script>
<script src="assets/app.js"></script>
<script>
document.addEventListener("DOMContentLoaded", () => {
  const dir = document.getElementById("dir");
  const q = document.getElementById("q");
  let activeCat = null;

  // 분야 바로가기 칩
  document.getElementById("catfilter").innerHTML =
    `<span class="fchip" data-cat="" aria-pressed="true">전체</span>` +
    App.categories.map(c => `<span class="fchip" data-cat="${c.id}" aria-pressed="false">${c.icon} ${c.name}</span>`).join("");

  function card(p) {
    return `<div class="pcard">
      <div class="row">
        <h3>${p.name}</h3>
        <span class="chip">${p.region}</span>
      </div>
      <p class="blurb">${p.blurb}</p>
      <a class="btn ghost" style="align-self:flex-start;padding:6px 10px;font-size:12px"
         href="${p.url}" target="_blank" rel="nofollow noopener"
         onclick="__track('outbound',{id:'${p.id}'})">공식 사이트 ↗</a>
    </div>`;
  }

  function render() {
    const kw = (q.value || "").trim().toLowerCase();
    const cats = App.categories.filter(c => !activeCat || c.id === activeCat);
    let html = "";
    let total = 0;
    for (const c of cats) {
      let list = App.byCategory(c.id);
      if (kw) list = list.filter(p =>
        p.name.toLowerCase().includes(kw) || p.blurb.toLowerCase().includes(kw) || c.name.toLowerCase().includes(kw));
      if (!list.length) continue;
      total += list.length;
      html += `<section class="catblock" id="cat-${c.id}">
        <h2 class="sec">${c.icon} ${c.name} <span class="muted" style="font-size:14px;font-weight:400">· ${c.desc} (${list.length})</span></h2>
        <div class="plist">${list.map(card).join("")}</div>
      </section>`;
    }
    dir.innerHTML = html || `<div class="empty">검색 결과가 없습니다. 다른 키워드로 찾아보세요.</div>`;
    if (kw && total) dir.insertAdjacentHTML("afterbegin", `<p class="sub">"${kw}" 검색 결과 ${total}개</p>`);
  }

  document.getElementById("catfilter").addEventListener("click", (e) => {
    const c = e.target.closest(".fchip"); if (!c) return;
    activeCat = c.dataset.cat || null;
    document.querySelectorAll("#catfilter .fchip").forEach(x => x.setAttribute("aria-pressed", x === c ? "true" : "false"));
    render();
    window.scrollTo({ top: 0, behavior: "smooth" });
  });
  q.addEventListener("input", render);
  render();
});
</script>
</body>
</html>
