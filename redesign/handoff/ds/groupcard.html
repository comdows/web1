<!-- @dsCard group="Components" name="GroupCard" subtitle="대분류 5장" width="900" -->
<!doctype html>
<html lang="ko" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GroupCard</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/ibm-plex-mono@5.0.8/index.min.css">
<style>
/* ============================================================
 * 세모플 (SEMOPL) — Design Tokens
 * Brand: 🅐 블루프린트 인프라 (Blueprint Infra)
 * 단일 진실 공급원(single source of truth). React/CSS 모두 이 변수를 참조.
 * 기본 = 다크. [data-theme="light"] 로 라이트 대응.
 * ============================================================ */

:root {
  /* ── Surfaces (Dark, default) ───────────────────────────── */
  --bg:        #0A0E1A;   /* app background */
  --surface:   #111725;   /* cards, panels */
  --surface-2: #161E30;   /* raised / hover */
  --surface-3: #1B2540;   /* active / selected */
  --line:      #25314C;   /* borders */
  --line-soft: #1B2334;   /* subtle dividers */

  /* ── Text ───────────────────────────────────────────────── */
  --text:   #E8EEFC;   /* primary (contrast ~15:1 on --bg) */
  --muted:  #97A6C8;   /* secondary */
  --faint:  #5E6C8C;   /* tertiary / captions */
  --on-brand: #FFFFFF; /* text on brand fills */

  /* ── Brand (신뢰 블루) ──────────────────────────────────── */
  --brand:      #3D63FF;  /* core brand */
  --brand-strong:#2445D4; /* pressed / light-mode text */
  --brand-soft: #7C97FF;  /* dark-mode accents / links */
  --brand-tint: rgba(61, 99, 255, .14);
  --brand-ring: rgba(61, 99, 255, .40);

  /* ── Accent ─────────────────────────────────────────────── */
  --cyan:       #38BDF8;  /* blueprint lines / measure (secondary accent) */
  --cyan-tint:  rgba(56, 189, 248, .14);
  --teal:       #22D3B8;  /* 검증·성사·신규 (verified / matched / new) — 절제 사용 */
  --teal-tint:  rgba(34, 211, 184, .15);

  /* ── Semantic ───────────────────────────────────────────── */
  --success:    #2CC08A; --success-tint: rgba(44,192,138,.16);
  --warn:       #F5B544; --warn-tint:    rgba(245,181,68,.15);
  --danger:     #F2695F; --danger-tint:  rgba(242,105,95,.15);
  --info:       var(--brand);

  /* ── Typography ─────────────────────────────────────────── */
  --font-sans: "Pretendard Variable", Pretendard, -apple-system, BlinkMacSystemFont,
               system-ui, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
  --font-mono: "IBM Plex Mono", "Space Mono", ui-monospace, SFMono-Regular,
               Menlo, Consolas, monospace;
  /* scale (px) */
  --fs-display: 40px; --fs-h1: 28px; --fs-h2: 22px; --fs-h3: 18px;
  --fs-body: 15px; --fs-sm: 13px; --fs-cap: 12px;
  --lh-tight: 1.15; --lh-snug: 1.35; --lh-body: 1.55;
  --tracking-tight: -0.02em; --tracking-wide: 0.12em;
  --w-regular: 400; --w-medium: 500; --w-semibold: 600; --w-bold: 700; --w-black: 800;

  /* ── Space (8px base) ───────────────────────────────────── */
  --sp-1: 4px; --sp-2: 8px; --sp-3: 12px; --sp-4: 16px;
  --sp-5: 24px; --sp-6: 32px; --sp-7: 48px; --sp-8: 64px;

  /* ── Radius (각진 인프라) ───────────────────────────────── */
  --r-xs: 6px; --r-sm: 8px; --r-md: 10px; --r-lg: 12px; --r-xl: 16px; --r-pill: 999px;

  /* ── Elevation ──────────────────────────────────────────── */
  --sh-1: 0 1px 2px rgba(0,0,0,.45);
  --sh-2: 0 8px 24px rgba(0,0,0,.40);
  --sh-focus: 0 0 0 3px var(--brand-ring);
  --sh-glow:  0 0 0 1px var(--brand-tint), 0 10px 30px rgba(61,99,255,.16);

  /* ── Blueprint graphic language ─────────────────────────── */
  --grid-line: rgba(124, 151, 255, .05);   /* 8px 그리드 노출 오버레이 */
  --grid-size: 8px;
  --tick: rgba(124, 151, 255, .28);          /* corner ticks / measure marks */

  /* ── Layout ─────────────────────────────────────────────── */
  --maxw: 1120px;
  --z-header: 100; --z-modal: 1000;
  --dur-fast: 120ms; --dur: 200ms; --ease: cubic-bezier(.2,.7,.2,1);
}

/* ── Light theme ────────────────────────────────────────────── */
[data-theme="light"] {
  --bg:        #F5F7FC;
  --surface:   #FFFFFF;
  --surface-2: #F0F3FA;
  --surface-3: #E7ECF7;
  --line:      #D7DEEC;
  --line-soft: #E7ECF5;

  --text:   #141C2E;   /* contrast ~13:1 on --bg */
  --muted:  #4E5B79;
  --faint:  #8A96B2;
  --on-brand: #FFFFFF;

  --brand-soft: #2445D4;             /* links read darker on light */
  --brand-tint: rgba(61, 99, 255, .10);
  --grid-line: rgba(36, 69, 212, .05);
  --tick: rgba(36, 69, 212, .28);
  --sh-1: 0 1px 2px rgba(16,24,40,.10);
  --sh-2: 0 8px 24px rgba(16,24,40,.12);
}


  *{box-sizing:border-box}
  body{margin:0;font-family:var(--font-sans);background:var(--bg);color:var(--text);line-height:var(--lh-body);
    background-image:linear-gradient(var(--grid-line) 1px,transparent 1px),linear-gradient(90deg,var(--grid-line) 1px,transparent 1px);
    background-size:var(--grid-size) var(--grid-size);-webkit-font-smoothing:antialiased}
  .wrap{max-width:var(--maxw);margin:0 auto;padding:40px 24px 100px}
  .mono{font-family:var(--font-mono);font-variant-numeric:tabular-nums}

  /* section framing (blueprint) */
  .sec{margin:0 0 40px}
  .sec > h2{font-family:var(--font-mono);font-size:12px;letter-spacing:var(--tracking-wide);text-transform:uppercase;
    color:var(--faint);margin:0 0 16px;padding-bottom:9px;border-bottom:1px solid var(--line-soft);display:flex;gap:10px;align-items:center}
  .sec > h2::before{content:"";width:8px;height:8px;border:1.5px solid var(--cyan);transform:rotate(45deg)}
  .panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);padding:22px;position:relative}
  .panel::before,.panel::after{content:"";position:absolute;width:10px;height:10px;border-color:var(--tick);border-style:solid;pointer-events:none}
  .panel::before{top:8px;left:8px;border-width:1px 0 0 1px}
  .panel::after{bottom:8px;right:8px;border-width:0 1px 1px 0}
  .row{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
  .stack{display:flex;flex-direction:column;gap:14px}
  .label{font-family:var(--font-mono);font-size:11px;color:var(--faint);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}

  /* top bar */
  .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:34px}
  .eyebrow{font-family:var(--font-mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--brand-soft)}
  .toggle{font-family:var(--font-mono);font-size:12px;background:var(--surface-2);border:1px solid var(--line);color:var(--text);
    padding:8px 14px;border-radius:var(--r-pill);cursor:pointer}

  /* ── Logo ── */
  .logo{display:inline-flex;align-items:center;gap:12px}
  .word{font-size:26px;font-weight:var(--w-black);letter-spacing:var(--tracking-tight)}
  .word b{color:var(--brand-soft)}
  .lock-sub{font-family:var(--font-mono);font-size:10px;color:var(--faint);letter-spacing:.1em;text-transform:uppercase;margin-top:3px}

  /* ── Type specimens ── */
  .t-display{font-size:var(--fs-display);font-weight:var(--w-black);letter-spacing:var(--tracking-tight);line-height:var(--lh-tight)}
  .t-h1{font-size:var(--fs-h1);font-weight:var(--w-black);letter-spacing:var(--tracking-tight)}
  .t-h2{font-size:var(--fs-h2);font-weight:var(--w-bold)}
  .t-body{font-size:var(--fs-body)}
  .t-cap{font-size:var(--fs-cap);color:var(--muted)}
  .type-line{display:flex;gap:16px;align-items:baseline;padding:10px 0;border-bottom:1px solid var(--line-soft);flex-wrap:wrap}
  .type-line .k{width:130px;flex:0 0 auto;font-family:var(--font-mono);font-size:11px;color:var(--faint)}

  /* ── Swatches ── */
  .sw-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}
  .sw{border:1px solid var(--line);border-radius:var(--r-sm);overflow:hidden;background:var(--surface-2)}
  .sw .c{height:56px}
  .sw .m{padding:7px 9px;font-family:var(--font-mono);font-size:11px}
  .sw .m .h{color:var(--faint)}

  /* ── Button ── */
  .btn{display:inline-flex;align-items:center;gap:7px;font-family:inherit;font-size:14px;font-weight:var(--w-semibold);
    padding:10px 16px;border-radius:var(--r-pill);border:1px solid transparent;cursor:pointer;text-decoration:none;color:var(--text);
    transition:transform var(--dur-fast) var(--ease),background var(--dur) var(--ease)}
  .btn:active{transform:translateY(1px)}
  .btn.primary{background:linear-gradient(135deg,var(--brand),var(--brand-strong));color:var(--on-brand);box-shadow:var(--sh-glow)}
  .btn.ghost{background:transparent;border-color:var(--line)}
  .btn.ghost:hover{background:var(--surface-2)}
  .btn.teal{background:var(--teal-tint);border-color:var(--teal);color:var(--teal)}
  .btn.sm{padding:6px 12px;font-size:12.5px}
  .btn.lg{padding:13px 22px;font-size:15px}

  /* ── Badge ── */
  .badge{display:inline-flex;align-items:center;gap:4px;font-family:var(--font-mono);font-size:11px;font-weight:700;
    letter-spacing:.04em;padding:3px 8px;border-radius:var(--r-xs)}
  .badge.new{background:var(--teal-tint);color:var(--teal)}
  .badge.good{background:var(--success-tint);color:var(--success)}
  .badge.soon{background:var(--warn-tint);color:var(--warn)}
  .badge.muted{background:var(--surface-3);color:var(--muted)}
  .badge.verify{background:var(--cyan-tint);color:var(--cyan)}

  /* ── Platform card ── */
  .pcard{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-md);padding:15px;width:300px;position:relative;transition:border-color var(--dur)}
  .pcard:hover{border-color:var(--brand)}
  .pcard .top{display:flex;align-items:flex-start;gap:11px}
  .avatar{width:38px;height:38px;border-radius:var(--r-sm);display:flex;align-items:center;justify-content:center;color:#fff;
    font-weight:var(--w-black);font-size:16px;flex:0 0 auto}
  .pcard h4{margin:0;font-size:15px;font-weight:var(--w-bold);display:flex;align-items:center;gap:6px}
  .pcard .cat{font-family:var(--font-mono);font-size:11px;color:var(--faint);margin-top:2px}
  .pcard p{margin:11px 0 0;font-size:13px;color:var(--muted);line-height:1.5}
  .pcard .star{margin-left:auto;color:var(--faint);cursor:pointer;font-size:16px;background:none;border:none}
  .pcard .star.on{color:var(--warn)}

  /* ── Stat tile ── */
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;max-width:520px}
  .stat{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-md);padding:15px 16px;position:relative;overflow:hidden}
  .stat::after{content:"";position:absolute;top:10px;right:10px;width:8px;height:8px;border-top:1px solid var(--tick);border-right:1px solid var(--tick)}
  .stat .n{font-family:var(--font-mono);font-size:26px;font-weight:700;letter-spacing:-.02em}
  .stat .n.b{color:var(--brand-soft)}.stat .n.t{color:var(--teal)}
  .stat .l{font-size:12px;color:var(--muted);margin-top:2px}

  /* ── Nav / header ── */
  .hdr{display:flex;align-items:center;justify-content:space-between;background:var(--surface);border:1px solid var(--line);
    border-radius:var(--r-md);padding:12px 18px}
  .hdr nav{display:flex;gap:20px;align-items:center;font-size:14px}
  .hdr nav a{color:var(--muted);text-decoration:none}
  .hdr nav a.active{color:var(--text);font-weight:var(--w-semibold)}
  .hdr .soon{font-family:var(--font-mono);font-size:10px;color:var(--warn);margin-left:4px}

  /* ── Search ── */
  .search{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--line);border-radius:var(--r-md);
    padding:14px 18px;max-width:560px}
  .search:focus-within{border-color:var(--brand);box-shadow:var(--sh-focus)}
  .search input{flex:1;background:none;border:none;outline:none;color:var(--text);font-family:inherit;font-size:16px}
  .search input::placeholder{color:var(--faint)}
  .search .ico{color:var(--faint)}

  /* ── Accordion ── */
  .acc{border:1px solid var(--line);border-radius:var(--r-md);overflow:hidden;max-width:640px}
  .acc-h{display:flex;align-items:center;gap:10px;padding:13px 16px;background:var(--surface);cursor:pointer}
  .acc-h .ic{font-size:16px}
  .acc-h .nm{font-weight:var(--w-semibold)}
  .acc-h .ct{margin-left:auto;font-family:var(--font-mono);font-size:12px;color:var(--faint)}
  .acc-h .chev{color:var(--faint);transition:transform var(--dur)}
  .acc.open .acc-h .chev{transform:rotate(90deg)}
  .acc-b{padding:14px 16px;border-top:1px solid var(--line-soft);display:none;gap:10px;flex-wrap:wrap}
  .acc.open .acc-b{display:flex}

  /* ── Group cards ── */
  .groups{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
  .gcard{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-md);padding:16px;cursor:pointer;transition:border-color var(--dur),transform var(--dur)}
  .gcard:hover{border-color:var(--brand);transform:translateY(-2px)}
  .gcard .g-ic{font-size:22px}
  .gcard h4{margin:8px 0 4px;font-size:16px;font-weight:var(--w-bold)}
  .gcard .g-meta{font-family:var(--font-mono);font-size:11px;color:var(--faint)}
  .gcard .g-cats{font-size:12px;color:var(--muted);margin-top:8px;line-height:1.5}

  /* ── Table (directory, high density) ── */
  table{width:100%;border-collapse:collapse;font-size:13px}
  thead th{font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--faint);
    text-align:left;padding:8px 12px;border-bottom:1px solid var(--line)}
  tbody td{padding:9px 12px;border-bottom:1px solid var(--line-soft)}
  tbody tr:hover{background:var(--surface-2)}
  td .nm{font-weight:var(--w-semibold)}
  td.num{font-family:var(--font-mono);text-align:right;color:var(--muted)}

  /* ── Banner ── */
  .banner{border:1px solid var(--line);border-left:3px solid var(--brand);background:var(--brand-tint);border-radius:var(--r-sm);
    padding:12px 15px;font-size:13.5px;color:var(--text);max-width:720px}
  .banner.admin{border-left-color:var(--teal);background:var(--teal-tint)}
  .banner code{font-family:var(--font-mono);font-size:12px;background:var(--surface-3);padding:1px 5px;border-radius:4px}

body{padding:28px}</style>
</head>
<body>
<section class="sec"><h2>Group Card · 그룹 카드</h2>
    <div class="panel"><div class="groups">
      <div class="gcard"><div class="g-ic">🛒</div><h4>커머스·판매채널</h4><div class="g-meta">10 분야 · 620 플랫폼</div><div class="g-cats">오픈마켓 · 소셜 · 라이브 · 패션 · 식품 …</div></div>
      <div class="gcard"><div class="g-ic">🚢</div><h4>해외·B2B·유통</h4><div class="g-meta">4 분야 · 210 플랫폼</div><div class="g-cats">수출입 · 도매 · 물류 · 사무·MRO</div></div>
      <div class="gcard"><div class="g-ic">🧑‍💼</div><h4>서비스·전문가·일자리</h4><div class="g-meta">4 분야 · 180 플랫폼</div><div class="g-cats">프리랜서 · 구인구직 · 홈서비스 · 법률세무</div></div>
    </div></div>
  </section>
</body>
</html>
